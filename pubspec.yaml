name: smartrack
description: SMARTRACK - Sistem Pelacakan Bus Jemputan Karyawan Industri Berbasis GPS Secara Real-Time
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.15.5
  firebase_database: ^10.4.4
  firebase_messaging: ^14.7.15
  firebase_analytics: ^10.8.5

  # Maps & Location
  geolocator: ^11.0.0
  geocoding: ^3.0.0

  # State Management
  flutter_riverpod: ^2.4.10
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # UI
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.0
  fl_chart: ^0.66.2
  intl: ^0.18.1
  url_launcher: ^6.2.4
  permission_handler: ^11.3.0
  image_picker: ^1.0.7
  flutter_local_notifications: ^17.0.0
  connectivity_plus: ^6.0.1
  shared_preferences: ^2.2.3
  timeago: ^3.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.11

dependency_overrides:
  flutter_plugin_android_lifecycle: 2.0.35

flutter:
  uses-material-design: true
  # Assets dan fonts di-comment dulu karena belum ada
  # Nanti bisa ditambahkan jika sudah ada file-nya
